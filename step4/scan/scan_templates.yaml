# Step4 v6.1 基础扫描模板库
# 每个维度包含：opening / follow_up / best_question
# 原则：会话式、有上下文、不像 checklist

revenue:
  - intent: 收入增长来源拆解
    description: 了解增长是来自老客户放量还是新客户拓展
    opening_pattern: "已知公司收入从 {last_revenue} 增长到 {current_revenue}，想了解这个增长主要来自老客户放量，还是新客户拓展？"
    follow_up_pattern: "如果不考虑新增客户，原有业务今年大概能实现多少增长？"
    best_question_pattern: "你们去年收入大概 {last_revenue}，今年为什么能到 {current_revenue}？主要来自老客户放量，还是新客户拓展？"

  - intent: 收入结构变化
    description: 了解各业务线占比变化
    opening_pattern: "现在收入里还是以美妆为主吗？食品和新能源大概分别占多少？"
    follow_up_pattern: "这几个业务线的毛利率差异大吗？"
    best_question_pattern: "食品订单增长 300%，这个是从一个多大的基数起来的？"

customer:
  - intent: 头部客户集中度
    description: 了解大客户占比和依赖程度
    opening_pattern: "像{key_customer}这样的核心客户，大概占你们整体收入多少？"
    follow_up_pattern: "前五大客户集中度如何？有没有过于依赖某一家？"
    best_question_pattern: "欧莱雅、雅诗兰黛这些头部客户，现在大概占你们收入多少比例？"

  - intent: 客户合作起点
    description: 了解客户是怎么开始的
    opening_pattern: "这些核心客户一般是怎么开始合作的？一开始是测试还是直接采购？"
    follow_up_pattern: "有没有客户试用之后没有继续合作的？为什么？"
    best_question_pattern: "你们是怎么搞定欧莱雅这种大客户的？是从小订单开始还是一开始就是大合作？"

industry:
  - intent: 竞争格局
    description: 了解直接竞争对手
    opening_pattern: "这个赛道目前大概有多少玩家在做？最直接的竞争对手是谁？"
    follow_up_pattern: "你们的超分子技术跟他们相比，核心差异在哪？"
    best_question_pattern: "改性原料这个赛道，除了你们还有谁在做？你们的超分子技术有什么不一样？"

  - intent: 行业成熟度
    description: 了解市场阶段
    opening_pattern: "这个方向目前是已经形成成熟市场，还是还在早期阶段？"
    follow_up_pattern: "下游客户对超分子原料的接受度如何？是主动找你们还是需要教育市场？"
    best_question_pattern: "这个市场现在是在快速起量阶段，还是说还需要教育客户？"

production:
  - intent: 产能利用率
    description: 了解现有产能状态
    opening_pattern: "目前产能利用率大概在什么水平？"
    follow_up_pattern: "现有产能主要瓶颈在哪一环？"
    best_question_pattern: "你们现在千吨级产能利用率大概是多少？订单多的时候会不会忙不过来？"

  - intent: 产能瓶颈分析
    description: 了解扩产计划
    opening_pattern: "如果需求在短时间内翻倍，最大的限制会在哪一环？"
    follow_up_pattern: "扩产周期大概多久？资金准备好了吗？"
    best_question_pattern: "如果明年订单再翻一倍，你们的产能跟得上吗？最大的瓶颈在哪？"

tech:
  - intent: 技术壁垒
    description: 了解核心技术护城河
    opening_pattern: "你们现在最核心的技术壁垒主要体现在哪一块？"
    follow_up_pattern: "这个壁垒是算法、配方、还是工艺积累？"
    best_question_pattern: "超分子 AI 平台是你们最核心的壁垒，这个具体体现在哪？是算法强还是数据积累深？"

  - intent: 技术可复制性
    description: 了解大厂复制难度
    opening_pattern: "如果一个大厂想做类似的东西，大概需要多久能做到接近水平？"
    follow_up_pattern: "他们现在有没有在跟进这个方向？"
    best_question_pattern: "如果欧莱雅自己招团队做 AI 研发，你们觉得他们多久能做到你们现在的水平？"

business_model:
  - intent: 商业模式定位
    description: 了解公司定位
    opening_pattern: "你们更倾向把自己定义为材料公司，还是平台公司？"
    follow_up_pattern: "这两种模式的毛利率差异大吗？"
    best_question_pattern: "你们现在是卖原料的模式，还是已经开始做技术服务和解决方案了？"

  - intent: 收入结构
    description: 了解收入来源分布
    opening_pattern: "当前收入主要来自原料销售，还是已经有成品或解决方案？"
    follow_up_pattern: "哪块业务的毛利率最高？"
    best_question_pattern: "技术服务这块现在占比多少？未来希望把这一块做到多大？"

new_business:
  - intent: 新业务进展
    description: 了解新业务阶段
    opening_pattern: "食品/新能源这些业务目前更偏研发合作，还是已经开始稳定出货？"
    follow_up_pattern: "目前有没有形成复购的客户？"
    best_question_pattern: "新能源这块中标了之后，实际出货了吗？还是说还在中试阶段？"

  - intent: 商业化验证
    description: 了解新业务落地情况
    opening_pattern: "新业务有没有已经形成复购或规模化客户的案例？"
    follow_up_pattern: "从投入到产出，新业务大概需要多久能盈亏平衡？"
    best_question_pattern: "食品业务现在跑出标杆客户了吗？还是说还在早期开拓阶段？"

team:
  - intent: 团队背景
    description: 了解核心团队构成
    opening_pattern: "核心团队大概多少人？全职的有几个？"
    follow_up_pattern: "技术团队主要是哪边过来的？"
    best_question_pattern: "你们团队里最核心的技术负责人是什么背景？之前在哪做过类似的东西？"

  - intent: 团队稳定性
    description: 了解团队流动情况
    opening_pattern: "团队稳定性如何？最近有没有核心人员离开？"
    follow_up_pattern: "激励机制是怎样的？有没有股权激励？"
    best_question_pattern: "技术团队流动大吗？核心算法的人有没有被挖过？"

funds:
  - intent: 融资进展
    description: 了解融资节奏
    opening_pattern: "目前的融资节奏是怎样的？有没有在谈下一轮？"
    follow_up_pattern: "账上现金大概能撑多久？"
    best_question_pattern: "你们现在估值大概在什么水平？这一轮想融多少钱？"

  - intent: 资金使用
    description: 了解资金用途
    opening_pattern: "如果这轮融资到位，主要会用在哪些方向？"
    follow_up_pattern: "研发和营销的投入比例怎么分配？"
    best_question_pattern: "这笔钱进来之后，主要会扩产能还是招人？还是说会加大营销投入？"

ip:
  - intent: 知识产权
    description: 了解专利布局
    opening_pattern: "目前专利布局大概多少了？核心专利在谁名下？"
    follow_up_pattern: "团队成员之前的专利归属是怎么处理的？"
    best_question_pattern: "超分子平台相关的专利是在公司手里还是在创始人个人手里？"
