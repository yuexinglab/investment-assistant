<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>新建项目 — AI 项目判断工作台</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <style>
    .form-group select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
      background-color: white;
      cursor: pointer;
    }
    .form-group select:focus {
      outline: none;
      border-color: #4a90e2;
      box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.1);
    }
    .profile-hint {
      font-size: 12px;
      color: #666;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="header">
      <a href="{{ url_for('index') }}" class="back-link">← 返回</a>
      <h1>新建项目</h1>
    </header>

    <div class="form-card">
      <form action="{{ url_for('create_project_route') }}" method="POST" enctype="multipart/form-data">
        <div class="form-group">
          <label for="company_name">公司名称 *</label>
          <input type="text" id="company_name" name="company_name"
                 placeholder="例如：杉海创新科技" required>
        </div>

        <div class="form-group">
          <label for="profile_id">投资人/基金画像</label>
          <select id="profile_id" name="profile_id">
            <option value="neutral_investor" selected>中性投资人（通用判断）</option>
            <option value="government_fund">政府产业基金</option>
            <option value="vc_fund">市场化VC基金</option>
            <option value="industrial_fund">产业资本</option>
            <option value="hong_gov_fund_v1">洪总政府产业基金视角 v1</option>
          </select>
          <p class="profile-hint">该画像会影响会前问题生成和最终fit判断，但不会影响会议事实提取。</p>
        </div>

        <div class="form-group">
          <label for="bp_file">上传 BP 材料 *</label>
          <div class="file-upload-area" id="uploadArea">
            <input type="file" id="bp_file" name="bp_file"
                   accept=".pdf,.txt,.docx,.md" required>
            <div class="file-upload-hint">
              <span class="upload-icon">📄</span>
              <p>点击选择文件或拖拽到此处</p>
              <p class="hint-small">支持 PDF / TXT / DOCX，最大 50MB</p>
            </div>
          </div>
          <p class="file-name-display" id="fileNameDisplay"></p>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn btn-primary btn-large">
            创建项目并上传 BP →
          </button>
        </div>
      </form>
    </div>
  </div>

  <script>
    // 显示选中的文件名
    document.getElementById('bp_file').addEventListener('change', function(e) {
      const name = e.target.files[0]?.name || '';
      document.getElementById('fileNameDisplay').textContent = name ? '已选择：' + name : '';
    });
  </script>
</body>
</html>
